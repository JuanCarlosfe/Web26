<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Aero Vista Hotel</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <header>
        <div class="logo">Aero Vista 🫧</div>
        <div class="nav-wrapper">
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="btn-menu">Menú ▾</label>
            <div class="menu-content">
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Catálogo</a>
                <input type="checkbox" id="submenu-toggle">
                <label for="submenu-toggle" class="submenu-label">Acerca del hotel ▸</label>
                <div class="submenu-items">
                    <a href="mision.html">Misión</a>
                    <a href="vision.html">Visión</a>
                    <a href="contacto.html">Contacto</a>
                </div>
                <a href="gestion.html" style="background: rgba(0, 120, 215, 0.1);"><b>Gestión</b></a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card" style="max-width: 500px;">
            <h2 style="color: #005a9e; margin-bottom: 10px;">¡Contáctanos!</h2>
            <p style="margin-bottom: 25px; color: #666;">Estamos aquí para hacer tu estancia más cristalina.</p>
            
            <form class="contact-form">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text" placeholder="Ej. Juan Pérez">
                </div>

                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" placeholder="usuario@ejemplo.com">
                </div>

                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                </div>

                <button type="button" class="btn-send">Enviar Mensaje 🫧</button>
            </form>

            <div class="contact-info">
                <div class="info-item"><b>Tel:</b> +1 800-AERO</div>
                <div class="info-item"><b>Ubicación:</b> Islas Aqua, 2026</div>
            </div>

            <a href="index.html" class="btn-back">◄ Regresar</a>
        </div>
    </main>
    <footer style="margin-top: auto; padding: 20px; text-align: center; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border-top: 1px solid rgba(255, 255, 255, 0.7); color: #005a9e; font-size: 0.9rem;">
        © 2026 Aero Vista Hotel. Todos los derechos reservados.
    </footer>

</body>
</html>
